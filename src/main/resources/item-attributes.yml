# Optional TerraTier item attribute overrides.
#
# The preferred CraftEngine bridge is to put attributes directly on the item:
#
# items:
#   terratier:mining_chestplate:
#     data:
#       pdc:
#         terratier:item_id: terratier:mining_chestplate
#         terratier:attributes: '[{"attribute":"mining_speed","value":10,"slot":"chest","source":"equipped"}]'
#
# Tools can set their harvest tier the same way:
#
# items:
#   terratier:copper_pickaxe:
#     data:
#       pdc:
#         terratier:item_id: terratier:copper_pickaxe
#         terratier:attributes: '[{"attribute":"tier","value":2}]'
#
# Use this file only when you want to keep the CraftEngine item YAML untouched.
# TerraTier matches these entries against item ids resolved from PDC, item_model,
# custom model data, and vanilla material fallbacks.
#
# terratier:mining_chestplate:
#   attributes:
#     - attribute: mining_speed
#       value: 10
#       slot: chest
#       source: equipped
#
# terratier:passive_charm:
#   attributes:
#     - attribute: mining_speed_multiplier
#       value: 1.15
#       source: inventory
