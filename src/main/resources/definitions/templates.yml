# CraftEngine Templates for TerraTier Mining
# These templates provide the foundational structure for TerraTier items.

templates:
  # Base template for all TerraTier items.
  terratier:item:
    material: ${material:-paper}
    data:
      item_name: ${name}
      lore: ${lore}
      custom_model_data: ${cmd:-0}
      unbreakable: ${unbreakable:-false}
      pdc:
        terratier:item_id: ${__NAMESPACE__}:${__ID__}
        terratier:attributes: ${attributes:-[]}

  # Specialized template for tools.
  terratier:tool:
    template: terratier:item
    merges:
      data:
        hide_tooltip: [enchantments, attribute_modifiers]

  # Specialized template for armor.
  terratier:armor:
    template: terratier:item
    arguments:
      material: ${material:-leather_chestplate}

  # EXAMPLE: Template that handles attribute placement (e.g. mining speed at top)
  # The web app now passes raw attribute values (like ${mining_speed}) to templates.
  terratier:smart_tool:
    template: terratier:tool
    overrides:
      data:
        lore:
          # If mining_speed is provided, put it at the top.
          - condition: "${mining_speed:-0} > 0"
            true: "<!i><#5555ff>+${mining_speed} Mining Speed"
          - ""
          - "${lore}"
