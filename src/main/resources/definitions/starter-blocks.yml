# TerraTier scans every .yml/.yaml file in this plugin folder and subfolders.
# These starter definitions are active out of the box.

blocks:
  minecraft:wheat:
    strength: 0.4
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 40

  minecraft:oak_log:
    strength: 1.5
    tool: axe
    min-tier: 0

  minecraft:birch_log:
    strength: 1.5
    tool: axe
    min-tier: 0

  minecraft:sand:
    strength: 2.0
    tool: shovel
    min-tier: 0

  minecraft:dirt:
    strength: 2.5
    tool: shovel
    min-tier: 0

  minecraft:stone:
    strength: 12.0
    tool: pickaxe
    min-tier: 1
    drops:
      - "minecraft:cobblestone:1-2"
      - "minecraft:gravel:0-1"

  minecraft:white_wool:
    strength: 5.0
    tool: any
    min-tier: 0
    auto-pickup: false

  minecraft:coal_ore:
    strength: 25.0
    tool: pickaxe
    min-tier: 2
    can-regenerate: true
    regeneration-delay: 600

  minecraft:sponge:
    strength: 10.0
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 60

  minecraft:wet_sponge:
    strength: 20.0
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 60

  minecraft:sugar_cane:
    strength: 0.5
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 100
    # Custom placeholder example: stay as baby cane instead of Bedrock
    regeneration-placeholder: "minecraft:sugar_cane[age=0]"

# Custom block example. Use /terramining debug full to find the host material
