# TerraTier scans every .yml/.yaml file in this plugin folder and subfolders.
# These starter definitions are active out of the box.

blocks:
  minecraft:wheat[age=7]:
    material: minecraft:wheat
    block-data-contains:
      - "age=7"
    strength: 0.4
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 40

  minecraft:oak_log:
    strength: 1.5
    tool: axe
    min-tier: 0

  minecraft:birch_log:
    strength: 1.5
    tool: axe
    min-tier: 0

  minecraft:sand:
    strength: 2.0
    tool: shovel
    min-tier: 0

  minecraft:dirt:
    strength: 2.5
    tool: shovel
    min-tier: 0

  minecraft:stone:
    strength: 12.0
    tool: pickaxe
    min-tier: 1
    drops:
      - "minecraft:cobblestone:1-2"
      - "minecraft:gravel:0-1"

  minecraft:white_wool:
    strength: 5.0
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 0
    drops:
      - strategy: pooled      # Base odds testing
        pool:
          - "minecraft:white_wool:1:1000"
          - "minecraft:light_gray_wool:1:100"
          - "minecraft:gray_wool:1:10"
          - "minecraft:black_wool:1:1"
      - strategy: independent # Luck boosts this
        pool:
          - "minecraft:shears:1:1/100"
      - strategy: static      # Unaffected by Luck
        pool:
          - "minecraft:string:1-3:100%"

  minecraft:coal_ore:
    strength: 25.0
    tool: pickaxe
    min-tier: 2
    can-regenerate: true
    regeneration-delay: 600
    drops:
      - strategy: pooled
        pool:
          - "minecraft:coal:1-2:1"
      - strategy: independent
        pool:
          - "minecraft:diamond:1:1/1000"

  minecraft:sponge:
    strength: 10.0
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 60
    drops:
      - strategy: pooled
        pool:
          - "minecraft:sponge:1:4"
          - "minecraft:wet_sponge:1:1"
      - strategy: independent
        pool:
          - "minecraft:coal:1:1/2"
          - "minecraft:diamond:1:1/2"

  minecraft:wet_sponge:
    strength: 20.0
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 60
    drops:
      - strategy: independent
        pool:
          - "minecraft:water_bucket:1:0.5"
          - "minecraft:bucket:1:0.5"

  minecraft:iron_ore:
    strength: 50.0
    tool: pickaxe
    min-tier: 3
    drops:
      - strategy: pooled
        pool:
          - "minecraft:raw_iron:1:128"
          - "minecraft:iron_ingot:1:10"
          - "minecraft:air:0:5"
      - strategy: independent
        pool:
          - "minecraft:diamond:1:1/5000"

  minecraft:sugar_cane:
    strength: 0.5
    tool: any
    min-tier: 0
    can-regenerate: true
    regeneration-delay: 100
    # Custom placeholder example: stay as baby cane instead of Bedrock
    regeneration-placeholder: "minecraft:sugar_cane[age=0]"

